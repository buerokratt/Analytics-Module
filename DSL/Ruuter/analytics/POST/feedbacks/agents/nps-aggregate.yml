declaration:
  call: declare
  version: 0.1
  description: "Aggregate NPS for selected CSAs (same chart shape as advisor conversations)"
  method: post
  accepts: json
  returns: json
  namespace: analytics
  allowlist:
    body:
      - field: end_date
        type: string
        description: "Body field 'end_date'"
      - field: excluded_csas
        type: array
        description: "Body field 'excluded_csas'"
      - field: metric
        type: string
        description: "Body field 'metric'"
      - field: start_date
        type: string
        description: "Body field 'start_date'"
      - field: urls
        type: array
        description: "Body field 'urls'"
      - field: showTest
        type: boolean
        description: "Body field 'showTest'"

check_for_required_parameters:
  switch:
    - condition: ${incoming.body == null || incoming.body.metric == null || incoming.body.start_date == null || incoming.body.end_date == null || incoming.body.excluded_csas == null}
      next: return_incorrect_request
  next: post_step

post_step:
  call: http.post
  args:
    url: "[#ANALYTICS_RESQL]/feedback-selected-csa-nps-aggregate"
    body:
      metric: ${incoming.body.metric}
      start: ${incoming.body.start_date}
      end: ${incoming.body.end_date}
      excluded_csas: ${incoming.body.excluded_csas}
      urls: ${incoming.body.urls}
      showTest: ${incoming.body.showTest}
  result: result

get_nps_object:
  call: http.post
  args:
    url: "[#ANALYTICS_DMAPPER_HBS]/get-csa-nps-object"
    headers:
      type: "json"
    body:
      pointNps: ${JSON.parse(result.response.body[0].result.value).pointNps ?? []}
      periodNps: ${JSON.parse(result.response.body[0].result.value).periodNps ?? 0}
  result: nps

return_value:
  wrapper: false
  return: ${nps.response.body}
  next: end

return_incorrect_request:
  status: 400
  return: "missing parameters"
  next: end
