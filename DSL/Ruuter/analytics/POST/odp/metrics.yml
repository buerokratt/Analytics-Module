declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'METRICS'"
  method: post
  accepts: json
  returns: json
  namespace: analytics
  allowlist:
    body:
      - field: end
        type: string
        description: "Body field 'end'"
      - field: metrics
        type: string
        description: "Body field 'metrics'"
      - field: period
        type: string
        description: "Body field 'period'"
      - field: start
        type: string
        description: "Body field 'start'"

set_variables:
  assign:
    metrics: ${incoming.body.metrics}

get-timescale:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/config/get_period_times"
    query:
      start: ${incoming.body.start}
      end: ${incoming.body.end}
      period: ${incoming.body.period}
  result: times

check-get-chat-count-total:
  switch:
    - condition: ${metrics.includes('get-chat-count-total')}
      next: get-chat-count-total
  next: check-get-chat-count-no-csa

get-chat-count-total:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/chat/get_chat_count_total"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_chat_count_total_result

check-get-chat-count-no-csa:
  switch:
    - condition: ${metrics.includes('get-chat-count-no-csa')}
      next: get-chat-count-no-csa
  next: check-get-avg-waiting-time

get-chat-count-no-csa:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/chat/get_chat_count_no_csa"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_chat_count_no_csa_result

check-get-avg-waiting-time:
  switch:
    - condition: ${metrics.includes('get-avg-waiting-time')}
      next: get-avg-waiting-time
  next: check-get-avg-messages

get-avg-waiting-time:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/overview/get_avg_waiting_time"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_avg_waiting_time_result

check-get-avg-messages:
  switch:
    - condition: ${metrics.includes('get-avg-messages')}
      next: get-avg-messages
  next: check-get-avg-time

get-avg-messages:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/overview/get_avg_messages"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_avg_messages_result

check-get-avg-time:
  switch:
    - condition: ${metrics.includes('get-avg-time')}
      next: get-avg-time
  next: check-get-avg-time-no-csa

get-avg-time:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/overview/get_avg_time"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_avg_time_result

check-get-avg-time-no-csa:
  switch:
    - condition: ${metrics.includes('get-avg-time-no-csa')}
      next: get-avg-time-no-csa
  next: check-get-avg-time-csa

get-avg-time-no-csa:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/overview/get_avg_time_no_csa"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_avg_time_no_csa_result

check-get-avg-time-csa:
  switch:
    - condition: ${metrics.includes('get-avg-time-csa')}
      next: get-avg-time-csa
  next: check-get-avg-session-length-client-left

get-avg-time-csa:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/overview/get_avg_time_csa"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_avg_time_csa_result

check-get-avg-session-length-client-left:
  switch:
    - condition: ${metrics.includes('get-avg-session-length-client-left')}
      next: get-avg-session-length-client-left
  next: check-get-avg-session-length-csa

get-avg-session-length-client-left:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/overview/get_avg_session_length_client_left"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_avg_session_length_client_left_result

check-get-avg-session-length-csa:
  switch:
    - condition: ${metrics.includes('get-avg-session-length-csa')}
      next: get-avg-session-length-csa
  next: check-get-avg-session-length-no-csa

get-avg-session-length-csa:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/overview/get_avg_session_length_csa"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_avg_session_length_csa_result

check-get-avg-session-length-no-csa:
  switch:
    - condition: ${metrics.includes('get-avg-session-length-no-csa')}
      next: get-avg-session-length-no-csa
  next: check-get-avg-response-time

get-avg-session-length-no-csa:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/overview/get_avg_session_length_no_csa"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_avg_session_length_no_csa_result

check-get-avg-response-time:
  switch:
    - condition: ${metrics.includes('get-avg-response-time')}
      next: get-avg-response-time
  next: gather_responses

get-avg-response-time:
  call: http.get
  args:
    url: "[#ANALYTICS_RESQL]/overview/get_avg_response_time"
    query:
      start: ${times.response.body[0].start}
      end: ${times.response.body[0].end}
  result: get_avg_response_time_result

gather_responses:
  assign:
    results: ${[(metrics.includes('get-chat-count-total') && get_chat_count_total_result.response.body) ?? "", (metrics.includes('get-chat-count-no-csa') && get_chat_count_no_csa_result.response.body) ?? "", (metrics.includes('get-avg-waiting-time') && get_avg_waiting_time_result.response.body) ?? "", (metrics.includes('get-avg-messages') && get_avg_messages_result.response.body) ?? "", (metrics.includes('get-avg-time') && get_avg_time_result.response.body) ?? "", (metrics.includes('get-avg-time-no-csa') && get_avg_time_no_csa_result.response.body) ?? "", (metrics.includes('get-avg-time-csa') && get_avg_time_csa_result.response.body) ?? "", (metrics.includes('get-avg-session-length-client-left') && get_avg_session_length_client_left_result.response.body) ?? "", (metrics.includes('get-avg-session-length-csa') && get_avg_session_length_csa_result.response.body) ?? "", (metrics.includes('get-avg-session-length-no-csa') && get_avg_session_length_no_csa_result.response.body) ?? "", (metrics.includes('get-avg-response-time') && get_avg_response_time_result.response.body) ?? ""].filter(item => item !== "" && item !== false)}

return:
  return: ${results}
  next: end
  status: 200
