declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'PREFERENCES'"
  method: post
  accepts: json
  returns: json
  namespace: analytics
  allowlist:
    body:
      - field: preferences
        type: object
        description: "Body field 'preferences'"
    header:
      - field: cookie
        type: string
        description: "Cookie field"

check_for_required_parameters:
  switch:
    - condition: ${incoming.body == null || incoming.body.preferences == null}
      next: return_incorrect_request
  next: extract_request_data

extract_request_data:
  assign:
    cookie: ${incoming.headers.cookie}
    preferences: ${incoming.body.preferences}
  next: check_if_authorized

check_if_authorized:
  template: "[#ANALYTICS_PROJECT_LAYER]/check-user-authority"
  requestType: templates
  headers:
    cookie: ${cookie}
  result: authority_result

update_metrics_preferences:
  call: http.post
  args:
    url: "[#ANALYTICS_RESQL]/update-metric-preferences"
    body:
      user_id_code: ${authority_result.idCode}
      preferences: ${preferences}
  result: result
  next: get_metrics_preferences

get_metrics_preferences:
  call: http.post
  args:
    url: "[#ANALYTICS_RESQL]/overview-metric-preferences"
    body:
      user_id_code: ${authority_result.idCode}
  result: metrics
  next: return_value

return_value:
  return: ${metrics.response.body}
  next: end

return_incorrect_request:
  status: 400
  return: 'missing parameters'
  next: end
